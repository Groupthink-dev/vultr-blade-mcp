name: vultr-blade-mcp
version: "0.5.1"
description: "Vultr GPU compute infrastructure MCP — VMs, bare metal, serverless inference, DNS, firewall, snapshots, billing"
author: groupthink-dev
license: MIT
tier: certified
author_type: first-party
# DD-385 live-hardening certification PASSED 2026-06-06 (v0.5.1). Live capture
# against the real account found + fixed a real wire defect: the entire 5-tool
# serverless-inference surface called /inference/subscriptions (→ 400 "Invalid
# subscription ID" on every call) instead of /inference — the untested surface
# let it ship. 11 read surfaces + 2 write surfaces (firewall-group + script
# create→high_risk-delete, write-gated) live-verified, zero orphans. Also fixed
# a real HTTP bearer-violation: the /mcp route had NO per-request auth fallback
# → ran fully unauthenticated + all-interfaces without MCP_API_TOKEN (and vultr
# can delete VMs) → now refuses http without a bearer token + binds loopback
# (DD-242). 7 destructive deletes re-classed external_side_effect → high_risk.
# Version was triple-drifted (manifest 0.3.1 / catalog 0.4.0 / pkg 0.5.0) → 0.5.1.
# Residuals (not blade defects): VM/bare-metal/inference CREATE not live-fired
# (billable provisioning / no inference subscription) — same write machinery
# verified on the firewall-group + script surfaces.
readiness: production

# DD-181 Wave 2: virtualmachine-v1 → virtualisation-v1 (DD-157), dns-v1 →
# dns-authoritative-v1 (pack-spec 2.0.0). Vultr blade declares three contracts;
# firewall, snapshots, scripts, plans, and billing are exposed as native tools.
contract:
  - virtualisation-v1
  - serverless-v1
  - dns-authoritative-v1

services:
  # Canonical virtualisation-v1 axis (added 2026-05-13 for DD-276 B.5a).
  # Maps the contract's Required ops to existing vultr_vm_* tools.
  # host_info is not supported — Vultr abstracts the hypervisor surface
  # (declared in not_supported below).
  virtualisation:
    workload_list: vultr_vm_list
    workload_get: vultr_vm_get
    workload_status: vultr_vm_status

  # Canonical serverless-v1 axis (added 2026-05-13 for DD-276 B.5b).
  # Maps the contract's Required ops to existing vultr_inference_* tools.
  # job_status + template_list not supported — Vultr inference is synchronous
  # and configuration-driven (no async jobs, no template catalog surface).
  serverless:
    endpoint_list: vultr_inference_list
    endpoint_get: vultr_inference_get
    endpoint_health: vultr_inference_usage    # usage stats ≈ closest health surface

  # Canonical dns-authoritative-v1 axis (added 2026-05-13 for DD-276 B.5c).
  # Maps the contract's Required ops to existing vultr_dns_* tools.
  # Vultr DNS uses "domains" terminology — maps to canonical "zones".
  dns_authoritative:
    record_list: vultr_dns_list_records
    record_create: vultr_dns_create_record
    record_update: vultr_dns_update_record
    record_delete: vultr_dns_delete_record
    # Recommended
    zone_list: vultr_dns_list_domains
    # record_get + zone_get not supported (Vultr only exposes list-form for both)

  # Vendor-native axes preserved for callers that consume this blade directly
  # outside the *-v1 adapters. Same tools, vendor-native key names.
  vm:
    list: vultr_vm_list
    get: vultr_vm_get
    status: vultr_vm_status
    create: vultr_vm_create
    delete: vultr_vm_delete
    start: vultr_vm_start
    stop: vultr_vm_stop
    reboot: vultr_vm_reboot
    update: vultr_vm_update
    bandwidth: vultr_vm_bandwidth
    reverse_dns: vultr_vm_set_reverse_dns
  plans:
    list: vultr_vm_list_plans
    regions: vultr_vm_list_regions
    images: vultr_vm_list_images
    ssh_keys: vultr_vm_ssh_keys
  snapshots:
    list: vultr_snap_list
    get: vultr_snap_get
    create: vultr_snap_create
    delete: vultr_snap_delete
  scripts:
    list: vultr_script_list
    get: vultr_script_get
    create: vultr_script_create
    delete: vultr_script_delete
  firewall:
    list_groups: vultr_fw_list_groups
    get_group: vultr_fw_get_group
    create_group: vultr_fw_create_group
    delete_group: vultr_fw_delete_group
    list_rules: vultr_fw_list_rules
    create_rule: vultr_fw_create_rule
  bare_metal:
    list: vultr_bm_list
    get: vultr_bm_get
    create: vultr_bm_create
    delete: vultr_bm_delete
    start: vultr_bm_start
    stop: vultr_bm_stop
    reboot: vultr_bm_reboot
    bandwidth: vultr_bm_bandwidth
    list_plans: vultr_bm_list_plans
  inference:
    list: vultr_inference_list
    get: vultr_inference_get
    create: vultr_inference_create
    delete: vultr_inference_delete
    usage: vultr_inference_usage
  dns:
    list_domains: vultr_dns_list_domains
    list_records: vultr_dns_list_records
    create_record: vultr_dns_create_record
    update_record: vultr_dns_update_record
    delete_record: vultr_dns_delete_record
  billing:
    history: vultr_billing_history
    account: vultr_account_info

setup:
  icon: "☁️"
  blurb: "Vultr GPU compute — provision VMs, manage bare metal, serverless inference, DNS, snapshots"
  auth_model: api_key
  complexity: simple
  links:
    - label: "Get API Key"
      url: "https://my.vultr.com/settings/#settingsapi"
  fields:
    - key: VULTR_API_KEY
      label: "API Key"
      secret: true
      required: true
      placeholder: "Your Vultr Personal Access Token"
      help: "Create at my.vultr.com → Account → API"
    - key: VULTR_WRITE_ENABLED
      label: "Enable write operations"
      type: boolean
      required: false
      help: "Create, delete, start, and stop VMs and bare metal instances"

install:
  runtime: node
  package: vultr-blade-mcp
  command: vultr-blade-mcp

env:
  - name: VULTR_API_KEY
    secret: true
    required: true
    description: "Vultr API key (Personal Access Token)"
  - name: VULTR_WRITE_ENABLED
    secret: false
    required: false
    description: "Set to 'true' to enable write operations (create, delete, start, stop)"

conformance:
  virtualisation-v1:
    required: untested
    recommended: untested
    optional: untested
    gated: untested
  serverless-v1:
    required: untested
    recommended: untested
    optional: untested
    gated: untested
  dns-authoritative-v1:
    required: untested
    recommended: untested
    optional: untested
    gated: untested
  last_tested: null

requires:
  adapter_contracts:
    - "virtualisation >= 1.0"
    - "serverless >= 1.0"
    - "dns_authoritative >= 1.0"
